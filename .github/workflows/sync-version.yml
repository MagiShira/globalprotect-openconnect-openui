name: Sync upstream version

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream version
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh api repos/yuezk/GlobalProtect-openconnect/releases/latest --jq '.tag_name')
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Read current version
        id: current
        run: |
          ver=$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -1)
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Bump Cargo.toml
        if: steps.upstream.outputs.version != steps.current.outputs.version
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.upstream.outputs.version }}"/' \
            src-tauri/Cargo.toml

      - name: Open PR
        if: steps.upstream.outputs.version != steps.current.outputs.version
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump version to ${{ steps.upstream.outputs.version }} to match upstream"
          title: "Bump version to ${{ steps.upstream.outputs.version }} (upstream sync)"
          body: |
            Upstream GlobalProtect-openconnect released **v${{ steps.upstream.outputs.version }}**.

            Bumping `Cargo.toml` to match so the upstream installer does not auto-replace the GP OpenUI binary.
          branch: "auto/version-sync-${{ steps.upstream.outputs.version }}"
          delete-branch: true
